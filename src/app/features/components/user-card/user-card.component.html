<div class="user-card-container">
  <h1>User Card</h1>
  <p>Name: {{ name() }}</p>
  <p>{{ welcomeMessage() }}</p>
  <p>Age: {{ age }}</p>
  <p>IsExpanded: {{ isExpanded() }}</p>
  <button (click)="toggleExpand()">Toggle Expand</button>
  <button (click)="sendGreetings()">Send greetings</button>
</div>
<div>
  <ng-content select=".title">Title</ng-content>
  <ng-content />
</div>
